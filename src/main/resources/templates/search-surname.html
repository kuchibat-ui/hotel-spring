<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<h1 class="text-center my-5">найти пользователя</h1>


<form action="/search-surname" method="get">
    <div class="mb-3">

        <input type="text"
               name="surname"
               th:value="${surname}"
               placeholder="введите имя для поиска">

        <button type="submit">найти</button>
    </div>
</form>


<br>

<div th:if="${surname}">
    <p>результаты поиска: <strong th:text="${surname}"></strong></p>
</div>
<table th:if="${findedClients != null }">


    <tbody>
    <tr th:each="client: ${findedClients}">


        <table table class="table table-success table-striped-columns">
            <thead>
            <tr>
                <th scope="col">номер по порядку</th>
                <th scope="col">ID</th>
                <th scope="col">Фамилия</th>
                <th scope="col">Имя</th>
                <th scope="col">Телефон</th>
                <th scope="col">Паспорт</th>
            </tr>
            </thead>
            <tbody class="table-group-divider">
            <tr>
                <th scope="row">1</th>
                <td th:text="${client.id}"></td>                         <!--отображаем тип-->
                <td th:text="${client.surname}"></td>
                <td th:text="${client.firstname}"></td>                                        <!-- отображаем статус-->
                <td th:text="${client.phone}"></td>
                <td th:text="${client.passport}"></td>
            </tr>

            </tbody>
        </table>

        <!-- цикл по каждой комнате по списку roomList-->

         <!-- и цену-->
    </tr>                                                               <!-- td- - это ячейка в таблице-->

</table>
<tr th:if="${findedClients == null }">
    <td colspan="3">поользователь с фамилией "<strong th:text="${surname}"></strong>" не найден</td>
</tr>
<div th:unless="${surname}">
    <p> Введите фамилию для поиска</p>
</div>
</tbody>
<a href="/"><div class="d-grid gap-2 d-md-block">
    <button class="btn btn-primary" type="button">На главную</button>

</div></a>

</body>
</html>
