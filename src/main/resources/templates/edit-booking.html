<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Редактировать бронирование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1 class="text-center my-5">Редактировать бронирование</h1>
    <form th:action="@{/edit-booking/{id}(id=${booking.id})}"
          th:object="${booking}"  method="post">   <!-- юзер заполняет поля и отправляет POST на add-client/-->
                                                   <!-- @-это URL путь; *- это поле внутри объекта; $- переменная из модели-->

        <div class="mb-3">
            <select name="clientId" id="clientId">                                <!--select выпадающй список-->
                <option value="">Выберите клиента</option>
                <option  th:each="client : ${clients}" th:value="${client.id}" th:text="${client.surname}"
                         th:selected="${client.id == booking.client.id}">       <!--selected выберется тот кто true что б показывал выбранного клиента-->
                </option>
            </select>
        </div>
        <div class="mb-3">
            <select name="roomId" id="roomId">             <!--select выпадающй список-->
                <option value="">Выберите комнату</option>
                <option  th:each="room : ${rooms}"
                         th:value="${room.id}"
                         th:text="${room.roomNumber}"
                         th:selected="${room.id == booking.room.id}">
                </option>
            </select>
        </div>


        <div class="mb-3">
            <label>Дата заезда</label>
            <input type="date" class="form-control" th:field="*{checkInDate}">
        </div>

        <div class="mb-3">
            <label>Дата выезда</label>
            <input type="date" class="form-control" th:field="*{checkOutDate}">
        </div>
        <div class="mb-3">
            <label>Количество гостей</label>
            <input type="text" class="form-control" th:field="*{guestsCount}">
        </div>


        <div class="mb-3">
            <select th:field="*{status}" id="">
                <option value = "Подтверждено">Подтверждено</option>
                <option value = "Отменено">Отменено</option>
                <option value = "Завершено">Завершено</option>
            </select>
        </div>
        <div class="mb-3">
            <input type="submit" class="form-control btn btn-primary" value="Сохранить изменения">
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
