<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
  <h1 class="text-center my-5">Регистрация нового пользователя</h1>
  <form th:action="@{/register}"

         method="post">
    <div class="mb-3">
      <label for="username">имя пользователя</label>
      <input type="text" class="form-control"   placeholder="имя пользоватвеля" id="username" name="username">
    </div>

    <div class="mb-3">
      <label>пароль</label>
      <input type="text" class="form-control"  name="password">
    </div>

    <div class="mb-3">
      <label>e-mail</label>
      <input type="text" class="form-control"   name="email">
    </div>

    <div class="mb-3">
      <input type="submit" class="form-control btn btn-primary" value="Отправить">
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
