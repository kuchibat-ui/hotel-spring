<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap hotelSpring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
        background-image: url('/img/image.jpg');
        background-size: cover;
         background-position: center;
          background-attachment:  fixed;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="text-center my-5">Добавить клиента</h1>
    <form th:action="@{/add-client}"
          th:object="${client}"  method="post">   <!-- юзер заполняет поля и отправляет POST на add-client/-->
                                                  <!-- @-это URL путь; *- это поле внутри объекта; $- переменная из модели-->

        <div class="mb-3">
            <label for="surname">Фамилия</label>
            <input type="text" class="form-control"
                   th:field="*{surname}" placeholder="фамилия" id="surname">   <!--*{} оззначает взять поле из объекта указанного th:object-->
        </div>


        <div class="mb-3">
            <label>Имя</label>
            <input type="text" class="form-control" th:field="*{firstname}">
        </div>

        <div class="mb-3">
            <label>Телефон</label>
            <input type="text" class="form-control" th:field="*{phone}">
        </div>
        <div class="mb-3">
            <label>Паспорт</label>
            <input type="text" class="form-control" th:field="*{passport}">
        </div>
        <div class="mb-3">
            <label>E-mail</label>
            <input type="text" class="form-control" th:field="*{email}">
        </div>
        <div class="mb-3">
            <input type="submit" class="form-control btn btn-primary" value="Отправить">
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
