<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>пользователи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<h1 class="text-center my-5">поиск комнаты по номеру</h1>


<form action="/search-numbers" method="get">
    <div class="mb-3">

        <input type="text"
               name="number"
               th:value="${number}"
               placeholder="введите номер комнаты для поиска">

        <button type="submit">найти</button>
    </div>
</form>


<br>

<div th:if="${number}">
    <p>результаты поиска: <strong th:text="${number}"></strong></p>
</div>
<table th:if="${findedNumbers != null }">

    <tbody>
    <tr th:each="room: ${findedNumbers}">


        <table table class="table table-success table-striped-columns">
            <thead>
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Номер комнаты</th>
                <th scope="col">Тип</th>
                <th scope="col">Стоимость за ночь</th>
                <th scope="col">Статус</th>
                <th scope="col"></th>
            </tr>
            </thead>
            <tbody class="table-group-divider">
            <tr>
                <th scope="row" th:text="${room.id}"></th>
                <td th:text="${room.roomNumber}"></td>
                <td th:text="${room.type}"></td>
                <td  th:text="${room.pricePerNight}"></td>
                <td th:text="${room.status}"></td>

            </tr>

            </tbody>
        </table>


    </tr>                                                               <!-- td- - это ячейка в таблице-->

</table>
<tr th:if="${findedClients == null }">
    <td colspan="3">комнаты с номером "<strong th:text="${number}"></strong>" не найдена</td>
</tr>
<div th:unless="${surname}">
    <p> Введите номер комнаты для поиска</p>
</div>
</tbody>
<a href="/"><div class="d-grid gap-2 d-md-block">
    <button class="btn btn-primary" type="button">На главную</button>

</div></a>

</body>
</html>
