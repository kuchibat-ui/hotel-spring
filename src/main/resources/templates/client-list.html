<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap hotelSpring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1 class="text-center my-5">Список клиентов</h1>
    <table class="table">                                     <!-- таблица из колонок:-->
        <thead>
        <tr class="table-info">
            <th scope="col">Фамилия</th>                    <!-- номер  комнаты-->
            <th scope="col">Имя</th>                   <!-- и т д-->
            <th scope="col">Телефон</th>
            <th scope="col">Паспорт</th>                         <!-- th -это столбец или колонка-->
            <th scope="col">E-mail</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client: ${clientList}">                          <!-- цикл по каждой комнате по списку roomList-->
            <th scope="row" th:text="${client.surname}"></th>       <!-- здесь отображаем номер комнаты-->
            <td th:text="${client.firstname}"></td>                         <!--отображаем тип-->
            <td th:text="${client.phone}"></td>                       <!-- отображаем статус-->
            <td th:text="${client.passport}"></td>
            <td th:text="${client.email}"></td> <!-- и цену-->
            <td>                                                                <!-- td- - это ячейка в таблице-->
                                                                                <!-- th -- это если надо из объекта что то вытащи-->
                <a th:href="@{/delete-client/{id}(id=${client.getId()})}">Удалить</a>     <!-- ссылка на путь который ведет к delete-странице , передается ему id, где указывается где взять его-->
                                                                                      <!-- то же самое только к edit-странице-->
            </td>                                                              <!-- $--(знак доллара) - обращение к элементам объекта-->
        </tr>
        </tbody>
    </table>


    <a href="/"><div class="d-grid gap-2 d-md-block">
        <button class="btn btn-primary" type="button">Назад</button>

    </div></a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
